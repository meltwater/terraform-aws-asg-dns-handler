---
# Automatically Generated File, DO NOT MODIFY (Maintained By Terraform)
# Code: https://github.com/meltwater/github-site/tree/master/modules/feature_issues_project
name: "Issues: Add to Project"

on:
  issues:
    types:
      - opened

jobs:
  add-to-project:
    name: Add issue to project
    runs-on: ubuntu-latest
    steps:
      # Authenticates & Creates Runtime Token
      # Token is revoked as part of workflow cleanup
      - name: Github App Authentication
        uses: actions/create-github-app-token@v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.GLOBAL_ACTIONS_WORKFLOWS_APP_ID }}
          private-key: ${{ secrets.GLOBAL_ACTIONS_WORKFLOWS_APP_KEY }}

      # Will associate with project variable
      # Definition: https://github.com/meltwater/__MY_REPO__/settings/variables/actions
      - uses: actions/add-to-project@v2.0.0
        with:
          project-url: https://github.com/orgs/meltwater/projects/${{ vars.ISSUES_PROJECT }}
          github-token: ${{ steps.app-token.outputs.token }}
